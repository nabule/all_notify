services:
  all-notify:
    build: .
    image: all-notify:latest
    container_name: all-notify
    restart: unless-stopped
    ports:
      - "8080:8080"
    command:
      - "-addr=:8080"
      - "-data-dir=/data"
      - "-send-timeout=10s"
      - "-log-max-bytes=10485760"
      - "-log-max-backups=5"
    volumes:
      - ./data:/data
